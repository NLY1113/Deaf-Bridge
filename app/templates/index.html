<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Deaf Bridge | Bridging the Gap</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; background: #0f172a; color: #f8fafc; font-family: 'Segoe UI', sans-serif; overflow-x: hidden; }
        #canvas-3d { position: fixed; top: 0; left: 0; z-index: -1; }
        .container { max-width: 900px; margin: 0 auto; padding: 100px 20px; text-align: center; }
        h1 { font-size: 3.5rem; color: #818cf8; margin-bottom: 20px; }
        .hero-desc { font-size: 1.2rem; color: #cbd5e1; line-height: 1.6; margin-bottom: 40px; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 50px; }
        .card { background: rgba(30, 41, 59, 0.7); padding: 30px; border-radius: 15px; backdrop-filter: blur(10px); transition: 0.3s; border: 1px solid #475569; }
        .card:hover { transform: translateY(-10px); border-color: #818cf8; }
        .link { display: inline-block; margin-top: 20px; padding: 12px 24px; background: #6366f1; color: white; text-decoration: none; border-radius: 8px; font-weight: bold; }
    </style>
</head>
<body>
    <canvas id="canvas-3d"></canvas>
    <div class="container">
        <h1>Deaf Bridge</h1>
        <p class="hero-desc">AI-powered communication tools to bridge the gap.</p>
        <div class="grid">
            <div class="card">
                <h3>Sign Translator</h3>
                <p>Real-time webcam translation.</p>
                <a href="/translator" class="link">Launch</a>
            </div>
            <div class="card">
                <h3>Sign Generator</h3>
                <p>3D avatar sign animation.</p>
                <a href="/generator" class="link">Launch</a>
            </div>
            <div class="card">
                <h3>Voice Translator</h3>
                <p>Speech-to-text bridge.</p>
                <a href="/voice-translator" class="link">Launch</a>
            </div>
        </div>
    </div>
    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('canvas-3d'), alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        const geometry = new THREE.SphereGeometry(0.1, 32, 32);
        const material = new THREE.MeshBasicMaterial({ color: 0x818cf8 });
        const stars = [];
        for(let i=0; i<100; i++) {
            const star = new THREE.Mesh(geometry, material);
            star.position.set((Math.random()-0.5)*10, (Math.random()-0.5)*10, (Math.random()-0.5)*10);
            scene.add(star); stars.push(star);
        }
        camera.position.z = 3;
        function animate() { requestAnimationFrame(animate); stars.forEach(s => { s.rotation.y += 0.01; }); renderer.render(scene, camera); }
        animate();
    </script>
</body>
</html>
